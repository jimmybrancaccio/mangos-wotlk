name: CMaNGOS - macOS Build

# Run the workflow when a push is made.
on:
  push:
    branches:
      - master

# Our job(s).
jobs:
  # Our job key.
  build:
    # The name of the job.
    name: Build
    
    # The build environment.
    runs-on: macos-latest
    
    # Setup some environment variables.
    env:
      OPENSSL_ROOT_DIR: $(brew --prefix openssl)
      MYSQL_HOME: /usr/local/opt/mysql-client@5.7
      CCACHE_SLOPPINESS: pch_defines,time_macros
    
    # Our build steps.
    steps:
      # Checks out a copy of the repository.
      - name: Checkout Code
        uses: actions/checkout@v2
        with:
          fetch-depth: 1
          
      - name: Install some dependencies
        run: |
          brew install boost mysql@5.7 mysql-client@5.7
          
      - name: Create Directories
        run: |
          cd /Users/runner/work/mangos-wotlk
          mkdir _build
          mkdir _install
          
      - name: Run cmake
        run: |
          cd /Users/runner/work/mangos-wotlk/_build
          cmake ../mangos-wotlk -DCMAKE_INSTALL_PREFIX=../_install -DDEBUG=0 -DBUILD_PLAYERBOT=ON -DBUILD_AHBOT=ON -DBUILD_EXTRACTORS=ON
        
      - name: Run make
        run: |
          cd /Users/runner/work/mangos-wotlk/_build
          make -j2
        
      - name: Run make install
        run: |
          cd /Users/runner/work/mangos-wotlk/_build
          make install
